#---------------------------------------------------
  - platform: homeassistant
    id: office_humidifier_control
    entity_id: automation.new_office_humidity_control
    trigger_on_initial_state: true
#    on_state:
#      then:
#        lvgl.widget.update:
#          id: office_humidifier_button
#          state:
#            checked: !lambda return x;
#-----------------------------------------------------------------------------
switch:
  - platform: restart
    name: "Restart"
#---------------------------------------------------
  - platform: gpio
    name: Backlight
    id: backlight_switch
    pin:
      ch422g: ch422g_hub
      number: 2
      allow_other_uses: true
      mode:
        output: true
    inverted: false
    restore_mode: ALWAYS_ON
#-----------------------------------------------------
  - platform: template
    name: Antiburn
    id: switch_antiburn
    icon: mdi:television-shimmer
    optimistic: true
    entity_category: "config"
    turn_on_action:
      - logger.log: "Starting Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
            - delay: 1s
      - lvgl.pause:
          show_snow: true
    turn_off_action:
      - logger.log: "Stopping Antiburn"
      - if:
          condition: lvgl.is_paused
          then:
            - lvgl.resume:
            - lvgl.widget.redraw:
#--------------------------------------------------------------------------------------------------
sensor:
- platform: wifi_signal
  name: "Signal Strength"
  update_interval: 60s
#---------------------------------------------------
- platform: veml7700
  address: 0x10
  update_interval: 60s
  i2c_id: i2cbus_a
  ambient_light:
    name: "Ambient light"
    id: od_Amb_Light
    unit_of_measurement: "Lx"
    state_class: measurement
    device_class: illuminance
    accuracy_decimals: 2
    filters:
      - offset: 0 # Placeholder for offset
      - lambda: return x * 1; # Placeholder for scaling
    on_value:
      then:
        - if:
            condition:
              lambda: 'return (x < (id(display_threshold).state));'
              #Check to see if the returned value is less than the setpoint
            then:
              - switch.turn_off: backlight_switch
            else:
              - switch.turn_on: backlight_switch
#------------------------
    on_value_range: 
      - below: 1.50
        then:
          - number.set:
              id: clock_text_opacity
              value: 65
#------------------------
      - above: 1.51
        below: 2.50
        then:
          - number.set:
              id: clock_text_opacity
              value: 75
#------------------------
      - above: 2.51
        below: 4.00
        then:
          - number.set:
              id: clock_text_opacity
              value: 85
#------------------------
      - above: 4.01
        then:
          - number.set:
              id: clock_text_opacity
              value: 100
#--------------------------------------
  full_spectrum:
    name: "White Light"
    id: od_white_light
  infrared:
    name: "Infrared"
    id: od_infred
#  ambient_light_counts:
#    name: "Amb Counts"
#  full_spectrum_counts:
#    name: "Full Spect Counts"
#  actual_gain:
#    name: "Actual gain"
