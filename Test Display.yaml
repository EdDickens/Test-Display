substitutions:
  name: "third-floor-display"
  friendly_name: Thrid Floor Display
  
  trending_up: "\U000F0535" # mdi:trending-up
  trending_down: "\U000F0533" # mdi:trending-up
  steady: "\U000F0534" # mdi:trending-neutral
  heater_on: "\U000F0438" # mdi:radiator
  fan: "\U000F0210" # mdi:fan
  ceiling_fan_light: "\U000F1798" # mdi:ceiling-fan-light
  recessed_lights: "\U000F179B" # mdi-light-recessed
  humidifier_icon: "\U000F1099" # mdi-air-humidifier

  Outlines: "0" # Setting to 0 will disable all Outlines.
#---------------------------------------------------------------------------------------------------
esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: false
  project: 
    name: mobydork.third_floor_display
    version: '1.0'
#---------------------------------------------------------------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  flash_size: 8MB
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
#---------------------------------------------------------------------------------------------------
# Enable logging
logger:
  logs:
    component: ERROR
#---------------------------------------------------------------------------------------------------
# Enable Home Assistant API
api:
  encryption:
    key: !secret haapi_key
#---------------------------------------------------------------------------------------------------
ota:
  - platform: esphome
    password: !secret ota_password
#---------------------------------------------------------------------------------------------------
# Creates a simple web server on the node that can be accessed through any browser
#web_server:
#  port: 80
#  ota: false
#  auth:
#    username: admin
#    password: !secret web_password
#---------------------------------------------------------------------------------------------------
wifi:
  min_auth_mode: wpa2
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: True
#--------------------------------------------------------------------------------------------------
psram:
  mode: octal
  speed: 80MHz
  enable_ecc: True
#--------------------------------------------------------------------------------------------------
i2c:
  - id: i2cbus_a
    sda: GPIO08
    scl: GPIO09
    scan: True
#--------------------------------------------------------------------------------------------------
ch422g:
  - i2c_id: i2cbus_a
    id: ch422g_hub
#---------------------------------------------------------------------------------------------------
remote_receiver:
  filter: 50us
  pin: 
    number: GPIO6
    inverted: true
  dump: pioneer
  on_pioneer: 
    then:
      - logger.log:
          format: "Received Pioneer Code: 0x%04X"
          args: [ 'x.rc_code_1' ]
      - lambda: |-
          if (x.rc_code_1 == 0x0045) {
            id(toggle_ceilingfan_light).execute();  //Toggle Celing Fan Light (CH-)
            }
            else if (x.rc_code_1 == 0x0047) {
            id(toggle_recessed_lights).execute();  //Toggle Recessed Lights (CH+)
            }
            else if (x.rc_code_1 == 0x0044) {
            id(change_ceilingfan_brightness).execute(-5);  //Dec Ceiling Fan Light (Prev |<<)
            }
            else if (x.rc_code_1 == 0x0040) {
            id(change_ceilingfan_brightness).execute(5);  //Inc Ceiling Fan Light (Next >>|)
            }
            else if (x.rc_code_1 == 0x0007) {
            id(change_recessed_brightness).execute(-5);  //Dec Recessed Lights (Vol- -)
            }
            else if (x.rc_code_1 == 0x0015) {
            id(change_recessed_brightness).execute(5);  //Inc Recessed Lights (Vol+ +)
            }
            else if (x.rc_code_1 == 0x0046) {
            id(turn_page).execute();  //Flip through the Pages (CH)
            }
#--------------------------------------------------------------------------------------------------
binary_sensor:
  - platform: homeassistant
    id: heater_toggle
    entity_id: switch.office_heater
    trigger_on_initial_state: true
#    on_state:
#      then:
#        lvgl.widget.update:
#          id: office_heater_button
#          state:
#            checked: !lambda return x;
#---------------------------------------------------
  - platform: homeassistant
    id: laptop_fan_toggle
    entity_id: switch.power_relays_relay_3
    trigger_on_initial_state: true
#    on_state:
#      then:
#        lvgl.widget.update:
#          id: laptop_fan_button
#          state:
#            checked: !lambda return x;
#---------------------------------------------------
  - platform: homeassistant
    id: third_floor_leds_toggle
    entity_id: light.3rd_floor_leds
    trigger_on_initial_state: true
    on_state:
      then:
        lvgl.widget.update:
