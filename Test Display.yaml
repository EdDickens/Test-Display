- platform: homeassistant
  id: ceiling_fan_brightness
  entity_id: light.3rd_floor_ceiling_fan_light
  attribute: brightness
  unit_of_measurement: "%"
  state_class: measurement
  internal: true
  on_value:
    then:
      - lambda: |-
          if (std::isnan(x) || x <=0) {
            lv_label_set_text(id(ceiling_fan_brightness_label), "Off");
            lv_slider_set_value(id(ceiling_fan_slider), (int)0, LV_ANIM_ON);
          } else {
            int cfpct = (int)(x / 2.55); // The brightness is returned as 0-255 so divide by 2.55 to scale to 0-100%
            lv_label_set_text_fmt(id(ceiling_fan_brightness_label), "%d%%", cfpct);
            lv_slider_set_value(id(ceiling_fan_slider), (int)x, LV_ANIM_ON);
          }
#--------------------------------------
- platform: homeassistant
  id: recessed_brightness
  entity_id: light.3rd_floor_leds
  attribute: brightness
  unit_of_measurement: "%"
  state_class: measurement
  internal: true
  on_value:
    then:
      - lambda: |-
          if (std::isnan(x) || x <=0) {
            lv_label_set_text(id(ceiling_lights_brightness_label), "Off");
            lv_slider_set_value(id(ceiling_lights_slider), (int)0, LV_ANIM_ON);
          } else {
            int pct = (int)(x / 2.55); // The brightness is returned as 0-255 so divide by 2.55 to scale to 0-100%
            lv_label_set_text_fmt(id(ceiling_lights_brightness_label), "%d%%", pct);
            lv_slider_set_value(id(ceiling_lights_slider), (int)x, LV_ANIM_ON);
          }
