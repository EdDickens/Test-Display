    id: esptime
    on_time_sync:
    - lvgl.label.update:
        id: display_time
        text: !lambda return id(Time12Hour).state;
    - lvgl.label.update:
        id: header_label
        text: !lambda return id(FullTimeDate).state;
    on_time:
      - hours: 6,11,17,23
        minutes: 0
