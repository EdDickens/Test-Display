script:
  - id: show_fan_brightness
    then:
      - lvgl.page.show:
          id: ceiling_fan_control_page
      - delay: 5s
      - lvgl.page.show:
          id: main_page
#---------------------------------------------------
  - id: show_recessed_brightness
    then:
      - lvgl.page.show:
          id: ceiling_lights_control_page
      - delay: 5s
      - lvgl.page.show:
          id: main_page
#---------------------------------------------------
  - id: turn_page
    then:
      - lvgl.page.next:
#---------------------------------------------------
  - id: toggle_ceilingfan_light
    then:
      - homeassistant.service: 
          service: light.toggle
          data: 
            entity_id: light.3rd_floor_ceiling_fan_light
      - script.stop: show_fan_brightness
      - script.stop: show_recessed_brightness
      - script.execute: show_fan_brightness
#-------------------------------------------------
  - id: toggle_recessed_lights
    then:
      - homeassistant.service: 
          service: light.toggle
          data: 
            entity_id: light.3rd_floor_leds
      - script.stop: show_recessed_brightness
      - script.stop: show_fan_brightness
      - script.execute: show_recessed_brightness
#-------------------------------------------------
  - id: change_ceilingfan_brightness
    parameters:
      step: int
    then:
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.3rd_floor_ceiling_fan_light
            brightness_step_pct: !lambda "return step;"
      - script.stop: show_fan_brightness
      - script.stop: show_recessed_brightness
      - script.execute: show_fan_brightness
#-------------------------------------------------
  - id: change_recessed_brightness
    parameters:
      step: int
    then:
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.3rd_floor_leds
            brightness_step_pct: !lambda "return step;"
      - script.stop: show_fan_brightness
      - script.stop: show_recessed_brightness
      - script.execute: show_recessed_brightness
