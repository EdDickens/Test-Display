number:
  - platform: template
    name: Screen Lux Threshold
    optimistic: true
    id: display_threshold
    unit_of_measurement: "lx"
    initial_value: .5
    restore_value: true
    min_value: 0
    max_value: 1000
    step: 0.1
    mode: box
#--------------------------------------------
  - platform: template
    name: Text Opacity
    optimistic: true
    id: clock_text_opacity
    unit_of_measurement: "%"
    initial_value: 100
    restore_value: true
    min_value: 1
    max_value: 100
    step: 1
    mode: box
    on_value: 
      then:
        - lvgl.label.update:
            id: 
              - header_label
              - page_prev
              - page_home
              - page_next
              - display_time
              - indoor_enviro_label
              - indoor_temp
              - indoor_humidity
              - outdoor_enviro_label
              - outdoor_temp
              - outdoor_humidity
              - pressure_enviro_label
              - home_pressure_trend
            text_opa: !lambda return id(clock_text_opacity).state / 100 * 255;
                      # Desired value needs to be scaled from a percent, then to a 0-255 range
        - lvgl.label.update:
            id: 
              - home_pressure_display
            bg_opa: !lambda return id(clock_text_opacity).state / 100 * 255;
#        - lvgl.label.update:
#            id: 
#              - display_pm25_id
#            text_opa: !lambda return (id(clock_text_opacity).state - 15) / 100 * 255;
                      # Desired value needs to be scaled from a percent, then to a 0-255 range
