- platform: homeassistant
  id: home_pressure
  entity_id: sensor.eddys_office_pressure
  unit_of_measurement: "%"
  state_class: measurement
  device_class: pressure
  internal: true
  on_value:
    - lvgl.label.update:
        id: home_pressure_display
        text:
          format:  "%.2f"
          args: [ 'x' ]  
#------------------------
  on_value_range: 
    - below: 29.40 # Very Low
      then:
        - lvgl.label.update:
            id: home_pressure_display
            text_color: 0xC60000
            bg_color: 0x000000
#------------------------
    - above: 29.41 # Low
      below: 29.70
      then:
        - lvgl.label.update:
            id: home_pressure_display
            text_color: 0xFF8000
            bg_color: 0x000000
#------------------------
    - above: 29.71 # A Littel Low
      below: 29.90
      then:
        - lvgl.label.update:
            id: home_pressure_display
            text_color: 0xE6E600
            bg_color: 0x000000
#------------------------
    - above: 29.91 # Normal
      below: 30.10
      then:
        - lvgl.label.update:
            id: home_pressure_display
            text_color: 0x00AA00
            bg_color: 0x000000
#------------------------
    - above: 30.11 # A Little High
      below: 30.30
      then:
        - lvgl.label.update:
            id: home_pressure_display
            text_color: 0x99AA00
            bg_color: 0x000000
#------------------------
    - above: 30.31 # High
      below: 30.50
      then:
        - lvgl.label.update:
            id: home_pressure_display
            text_color: 0x6600AA
            bg_color: 0x000000
#------------------------
    - above: 30.51 # Very High
      then:
        - lvgl.label.update:
            id: home_pressure_display
            text_color: 0xA400AA
            bg_color: 0x000000
#--------------------------------------
- platform: homeassistant
  id: pressure_trend
  entity_id: sensor.avg_pressure_trend
  unit_of_measurement: ""
  state_class: measurement
  device_class: humidity
  internal: true
  on_value_range: 
    - below: -0.030 #Falling Fast
      then:
        - lvgl.label.update:
            id: home_pressure_trend
            text: $trending_down
            text_color: 0xFF0000
#------------------------
    - above: -0.029 #Falling
      below: -0.020
      then:
        - lvgl.label.update:
            id: home_pressure_trend
            text: $trending_down
            text_color: 0xFF8000
#------------------------
    - above: -0.019 # Slowly Falling
      below: -0.010
      then:
        - lvgl.label.update:
            id: home_pressure_trend
            text: $trending_down
            text_color: 0xE6E600
#------------------------
    - above: -0.009 # Steady
      below: 0.010
      then:
        - lvgl.label.update:
            id: home_pressure_trend
            text: $steady
            text_color: 0xFFFFFF
#------------------------
    - above: 0.011 # Slowly Rising
      below: 0.020
      then:
        - lvgl.label.update:
            id: home_pressure_trend
            text: $trending_up
            text_color: 0xE6E600
#------------------------
    - above: 0.021 # Rising
      below: 0.030
      then:
        - lvgl.label.update:
            id: home_pressure_trend
            text: $trending_up
            text_color: 0xFF8000
#------------------------
    - above: 0.031 # Rising Fast
      then:
        - lvgl.label.update:
            id: home_pressure_trend
            text: $trending_up
            text_color: 0xFF0000
